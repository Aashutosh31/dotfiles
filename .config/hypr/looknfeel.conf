# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 6
    border_size = 2
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Change to niri-like side-scrolling layout
    # layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
      }

      dim_inactive = true
      dim_strength = 0.12

    # Use round window corners
    # rounding = 8

    # Dim unfocused windows (0.0 = no dim, 1.0 = fully dimmed)
    # dim_inactive = true
    # dim_strength = 0.15
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {

     enabled = yes

     bezier = easeOut, 0.25, 0.1, 0.25, 1.0
     bezier = smooth, 0.4, 0.0, 0.2, 1.0

     animation = windows, 1, 5, smooth, slide
     animation = windowsOut, 1, 5, smooth, slide
     animation = border, 1, 10, default
     animation = fade, 1, 5, easeOut
     animation = workspaces, 1, 6, smooth, slidefade
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
