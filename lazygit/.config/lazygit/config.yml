gui:
  theme:
    activeBorderColor:
      - "#7aa2f7"
      - bold
    inactiveBorderColor:
      - "#565f89"
    selectedLineBgColor:
      - "#2e3c64"
    optionsTextColor:
      - "#7dcfff"
    cherryPickedCommitBgColor:
      - "#3b4261"
    cherryPickedCommitFgColor:
      - "#9ece6a"
    unstagedChangesColor:
      - "#f7768e"
    searchingActiveBorderColor:
      - "#e0af68"
      - bold
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
os:
  editPreset: vscode
promptToReturnFromSubprocess: false
disableStartupPopups: true
customCommands: []
